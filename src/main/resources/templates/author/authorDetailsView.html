<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml"
      th:replace="~{layout :: main(~{:: main}, ${selectedAuthor.name})}">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900">

<main class="max-w-7xl mx-auto px-4 py-12">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center mb-20">

        <div class="aspect-square flex items-center justify-center bg-gray-100 rounded-full w-full max-w-md mx-auto group border border-gray-50 overflow-hidden">
            <img th:if="${selectedAuthor.profileImageId != null}"
                 th:src="@{/books/image/{id}(id=${selectedAuthor.profileImageId})}"
                 class="w-full h-full object-cover" />

            <svg th:unless="${selectedAuthor.profileImageId != null}"
                 class="w-32 h-32 text-gray-300 group-hover:text-gray-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
        </div>

        <div class="flex flex-col h-full justify-center">
            <h1 class="text-5xl font-extrabold tracking-tighter mb-2" th:text="${selectedAuthor.name}">Author Name</h1>
            <p class="text-gray-400 uppercase tracking-widest text-xs font-bold mb-8">Author Biography & Details</p>

            <div class="space-y-4 mb-10 border-t border-gray-100 pt-8">
                <div th:if="${#maps.isEmpty(selectedAuthor.customAttributes)}" class="text-gray-400 italic text-sm">
                    No additional biography details provided for this author.
                </div>

                <div th:each="entry : ${selectedAuthor.customAttributes}" class="flex items-baseline">
                    <span class="font-bold uppercase tracking-wider text-xs text-gray-500 w-32 shrink-0" th:text="|${entry.key}|">Key</span>
                    <span class="text-gray-900 text-lg" th:text="${entry.value}">Value</span>
                </div>
            </div>

            <div sec:authorize="hasRole('ADMIN')" class="pt-6">
                <a th:href="@{/authors/edit/{id}(id=${selectedAuthor.id})}"
                   class="inline-block px-8 py-4 border border-black text-black text-xs font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all active:scale-95 text-center">
                    Edit Profile
                </a>
            </div>
        </div>
    </div>

    <section class="border-t border-gray-100 pt-16">
        <div class="flex items-center justify-between mb-12">
            <h2 class="text-3xl font-bold tracking-tight">Books by this Author</h2>
            <span class="text-sm text-gray-400 font-medium" th:text="${#lists.size(authorBooks) + ' titles found'}">0 titles found</span>
        </div>

        <div th:if="${not #lists.isEmpty(authorBooks)}">
            <div th:replace="~{fragments/book-grid :: book-grid(books=${authorBooks})}"></div>
        </div>

        <div th:if="${#lists.isEmpty(authorBooks)}" class="py-12 bg-gray-50 rounded-lg text-center">
            <p class="text-gray-500 italic">This author currently has no books listed in our catalog.</p>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/books/insert}" class="text-black underline text-sm mt-2 inline-block">Add first book</a>
        </div>
    </section>

    <div class="mt-20">
        <a th:href="@{/authors}" class="text-sm font-medium text-gray-500 hover:text-black transition-colors flex items-center gap-2">
            ← Back to Authors List
        </a>
    </div>
</main>

</body>
</html>
