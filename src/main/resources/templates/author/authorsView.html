<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml"
      th:replace="~{layout :: main(~{:: main}, 'Authors List')}">
<head>
    <title>Authors Catalog</title>
</head>
<body class="bg-white text-gray-900">

<main class="max-w-7xl mx-auto px-4 py-12">
    <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-4">
        <h1 class="text-3xl font-bold">Authors</h1>

        <div class="flex gap-4 w-full max-w-md">
            <input type="text"
                   name="authorName"
                   placeholder="Search authors..."
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-black outline-none"
                   hx-get="/authors/search-suggestions"
                   hx-trigger="keyup changed delay:500ms"
                   hx-target="#author-grid"
                   hx-swap="outerHTML">

            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/authors/insert}"
               class="px-4 py-2 bg-black text-white text-xs font-bold uppercase tracking-widest hover:bg-gray-800 transition-all flex items-center">
                + New
            </a>
        </div>
    </div>

    <div id="author-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-12 gap-y-16">
        <div th:each="a : ${authors}" class="relative group flex flex-col">

            <div class="aspect-[1/1] flex items-center justify-center bg-gray-100 rounded-full mb-6 group-hover:bg-gray-200 transition-colors mx-auto w-48">
                <svg class="w-20 h-20 text-gray-300 group-hover:text-gray-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>

            <div sec:authorize="hasRole('ADMIN')" class="absolute top-0 right-0 z-30">
                <a th:href="@{/authors/edit/{id}(id=${a.id})}"
                   class="flex items-center justify-center w-8 h-8 bg-white/90 backdrop-blur-sm shadow-md hover:bg-black hover:text-white transition-all border border-gray-100">
                    <svg xmlns:svg="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                    </svg>
                </a>
            </div>

            <div class="text-center">
                <h3 class="font-bold text-lg leading-tight mb-2">
                    <a th:href="@{/authors/{id}(id=${a.id})}"
                       th:text="${a.name}"
                       class="hover:text-gray-600 transition-colors">
                        Author Name
                    </a>
                </h3>

                <p class="text-sm text-gray-500 italic mb-4">
                    <span th:text="${bookCounts.get(a.id)}">0</span> Books
                </p>

                <div class="flex justify-center">
                    <a th:href="@{/authors/{id}(id=${a.id})}"
                       class="px-6 py-2 border border-black text-black text-xs font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all">
                        View Profile
                    </a>
                </div>
            </div>

        </div>
    </div>

    <div th:if="${#lists.isEmpty(authors)}" class="py-20 text-center">
        <p class="text-gray-500">No authors found in the catalog.</p>
    </div>
</main>

</body>
</html>
