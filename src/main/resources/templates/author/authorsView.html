<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml"
      th:replace="~{layout :: main(~{:: main}, 'Authors List')}">
<head>
    <title>Authors Catalog</title>
</head>
<body class="bg-white text-gray-900">
<main class="max-w-7xl mx-auto px-4 py-12">

    <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-4">
        <h1 class="text-3xl font-bold">Authors</h1>

        <div class="flex gap-4 w-full max-w-md">
            <input type="text"
                   name="authorName"
                   placeholder="Search authors..."
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-black outline-none"
                   hx-get="/authors/search"
                   hx-trigger="keyup changed delay:500ms"
                   hx-target="#author-grid"
                   hx-swap="outerHTML">

            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/authors/insert}"
               class="px-4 py-2 bg-black text-white text-xs font-bold uppercase tracking-widest hover:bg-gray-800 transition-all flex items-center shrink-0">
                + New
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/author-grid :: author-grid(authors=${authors}, bookCounts=${bookCounts})}"></div>

</main>
</body>
</html>
