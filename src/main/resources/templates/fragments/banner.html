<div th:fragment="banner(featuredBooks)" class="relative w-full h-[450px] overflow-hidden bg-gray-50 group">

    <div id="slider-track" class="flex h-full transition-transform duration-700 ease-in-out" style="transform: translateX(0%);">

        <div th:each="book : ${featuredBooks}" class="min-w-full h-full shrink-0">
            <div class="max-w-7xl mx-auto px-4 h-full flex items-center">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center w-full">
                    <div class="space-y-4">
                        <span class="text-xs font-bold uppercase tracking-widest text-gray-400">Featured Selection</span>
                        <h2 class="text-5xl font-extrabold text-gray-900 leading-tight" th:text="${book.title}">Book Title</h2>
                        <p class="text-2xl font-medium text-black" th:text="|${book.price} RSD|">0 RSD</p>
                        <a th:href="@{/books/{id}(id=${book.id})}"
                           class="inline-block px-10 py-4 bg-black text-white text-xs font-bold uppercase tracking-widest hover:bg-gray-800 transition-all">
                            View Book
                        </a>
                    </div>

                    <div class="flex justify-center md:justify-end">
                        <img th:if="${book.coverImageId != null}"
                             th:src="@{/books/image/{id}(id=${book.coverImageId})}"
                             class="h-80 object-contain" />

                        <div th:unless="${book.coverImageId != null}"
                             class="h-80 aspect-[2/3] flex items-center justify-center bg-gray-200">
                            <svg class="w-16 h-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                            </svg>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <button onclick="changeSlide(-1)" class="absolute left-6 top-1/2 -translate-y-1/2 p-3 bg-white/80 rounded-full hover:bg-black hover:text-white transition-all z-30">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2"/></svg>
    </button>
    <button onclick="changeSlide(1)" class="absolute right-6 top-1/2 -translate-y-1/2 p-3 bg-white/80 rounded-full hover:bg-black hover:text-white transition-all z-30">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2"/></svg>
    </button>
</div>
