<div th:fragment="suggestions">
    <button type="button"
            th:each="a : ${suggestedAuthors}"
            th:data-id="${a.id}"
            th:data-name="${a.name}"
            onclick="selectAuthorFromData(this)"
            class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-black hover:text-white border-b border-gray-50 last:border-0 transition-colors">
        <span th:text="${a.name}">Author Name</span>
    </button>
</div>
