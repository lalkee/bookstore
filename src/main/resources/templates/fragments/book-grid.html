<div th:fragment="book-grid(books)" id="book-grid"
     class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-12 gap-y-16"
     xmlns:sec="http://www.w3.org/1999/xhtml">

    <div th:each="b : ${books}"
         class="relative group flex flex-col bg-transparent p-5 rounded-lg
            shadow-none hover:shadow-xl hover:border-transparent hover:-translate-y-1
            transition-all duration-300">

        <div class="aspect-[2/3] flex items-center justify-center bg-gray-50 rounded-md mb-4 group-hover:bg-gray-100 transition-colors overflow-hidden">
            <img th:if="${b.coverImageId != null}"
                 th:src="@{/books/image/{id}(id=${b.coverImageId})}"
                 class="w-full h-full object-cover" />
            <svg th:unless="${b.coverImageId != null}" class="w-12 h-12 text-gray-300 group-hover:text-gray-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
        </div>

        <div sec:authorize="hasRole('ADMIN')" class="absolute top-7 right-7 z-30">
            <a th:href="@{/books/edit/{id}(id=${b.id})}"
               class="flex items-center justify-center w-8 h-8 bg-white/90 backdrop-blur-sm shadow-md hover:bg-black hover:text-white transition-all border border-gray-100 rounded-full">
                <svg xmlns:svg="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
            </a>
        </div>

        <h3 class="font-bold text-base leading-tight mb-1">
            <a th:href="@{/books/{id}(id=${b.id})}" th:text="${b.title}"
               class="after:absolute after:inset-0 hover:text-gray-600 transition-colors z-10">
                Book Title
            </a>
        </h3>

        <div class="mb-4 relative z-20">
            <a th:href="@{/authors/{id}(id=${b.authorId})}"
               th:text="${b.authorName}"
               class="text-sm text-gray-500 italic hover:text-black transition-colors">
                Author Name
            </a>
        </div>

        <div class="flex items-center justify-between gap-4 mt-auto">
            <span class="text-lg font-medium tracking-tight" th:text="|${b.price} RSD|">0.00 RSD</span>
            <div class="relative z-20">
                <input type="hidden" name="id" th:value="${b.id}">
                <button hx-post="/cart/add" hx-target="#cart-count" hx-include="closest div" hx-swap="innerHTML"
                        class="px-4 py-2 bg-transparent text-xs font-bold uppercase tracking-widest hover:bg-primary-hover hover:text-on-primary transition-all active:scale-95">
                    Add to cart
                </button>
            </div>
        </div>
    </div>
</div>
