<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml"
      th:replace="~{layout :: main(~{:: main}, 'Catalog')}">
<head>
    <title>Bookstore Catalog</title>
</head>
<body class="bg-white text-gray-900">

<main class="max-w-7xl mx-auto px-4 py-12">
    <div class="flex justify-end mb-12">
        <input type="text"
               name="title"
               placeholder="Search by title..."
               class="w-full max-w-md px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-black outline-none ml-auto"
               hx-get="/books/search"
               hx-trigger="keyup changed delay:500ms"
               hx-target="#book-grid"
               hx-swap="outerHTML">
    </div>

    <div th:replace="~{fragments/book-grid :: book-grid(books=${books})}"></div>

    <div th:if="${#lists.isEmpty(books)}" class="py-20 text-center">
        <p class="text-gray-500 text-lg">Our catalog is currently empty. Check back later!</p>
    </div>
</main>

</body>
</html>
