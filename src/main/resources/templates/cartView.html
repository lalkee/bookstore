<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900">
<div th:replace="~{fragments :: header}"></div>

<main class="max-w-7xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold mb-8">Your Selected Books</h1>

    <div th:if="${#lists.isEmpty(cart.items)}">
        <p>Your cart is empty! <a th:href="@{/books}" class="text-blue-500 hover:underline">Go back and add books.</a></p>
    </div>

    <div th:unless="${#lists.isEmpty(cart.items)}">

        <div class="space-y-4">
            <div th:each="item : ${cart.items}" class="flex items-center justify-between border-b pb-4">
                <div>
                    <span class="font-bold" th:text="'Title: '+${item.title}">Book Title</span>
                    <span class="ml-4" th:text="'Quantity: '+${item.quantity}">Quantity</span>
                </div>
                <form method="POST" th:action="@{/cart/remove}">
                    <input type="hidden" name="id" th:value="${item.bookId}">
                    <button type="submit" class="px-4 py-2 bg-red-600 text-white text-xs font-bold uppercase tracking-widest rounded hover:bg-red-700 transition-all active:scale-95">Remove</button>
                </form>
            </div>
        </div>

        <hr class="my-8">

        <form method="POST" th:action="@{/cart/checkout}" class="max-w-lg">
            <h3 class="text-2xl font-bold mb-4">Shipping Details</h3>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">Address:</label>
                <input type="text" name="address" required class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            </div>
            <button type="submit" class="w-full px-4 py-2 bg-black text-white text-xs font-bold uppercase tracking-widest rounded hover:bg-gray-800 transition-all active:scale-95">Complete Purchase</button>
        </form>

    </div>
</main>
</body>
</html>
