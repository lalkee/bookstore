<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout</title>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>

<h1>Your Selected Books</h1>

<div th:if="${#lists.isEmpty(cart.getBooks())}">
    <p>Your cart is empty! <a th:href="@{/}">Go back and add books.</a></p>
</div>

<div th:unless="${#lists.isEmpty(cart.getBooks())}">
    <div th:each="b : ${cart.getBooks()}">
        <form method="POST" th:action="@{/remove}">
            <input type="hidden" name="id" th:value="${b.id}">
            <span th:text="${b.title}">Book title</span>
            <button type="submit">Remove</button>
        </form>
    </div>

    <hr>

    <form method="POST" th:action="@{/purchase}">
        <h3>Shipping Details</h3>
        <label>Address:</label>
        <input type="text" name="address" required>
        <br><br>
        <button type="submit">Complete Purchase</button>
    </form>
</div>
</body>
</html>
