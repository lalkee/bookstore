<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout</title>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>

<h1>Your Selected Books</h1>

<div th:if="${#lists.isEmpty(cart.items)}">
    <p>Your cart is empty! <a th:href="@{/books}">Go back and add books.</a></p>
</div>

<div th:unless="${#lists.isEmpty(cart.items)}">

    <div th:each="item : ${cart.items}">
        <form method="POST" th:action="@{/cart/remove}">
            <input type="hidden" name="id" th:value="${item.bookId}">
            <span th:text="'Title: '+${item.title}">Book Title</span>
            <span th:text="'Quantity: '+${item.quantity}">Quantity</span>
            <button type="submit">Remove</button>
        </form>
    </div>

    <hr>

    <form method="POST" th:action="@{/cart/checkout}">
        <h3>Shipping Details</h3>
        <label>Address:</label>
        <input type="text" name="address" required>
        <br><br>
        <button type="submit">Complete Purchase</button>
    </form>

</div>
</body>
</html>
