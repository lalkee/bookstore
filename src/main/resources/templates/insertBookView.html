<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: main(~{:: main}, 'Add New Book')}">
<body>

<main class="max-w-7xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold mb-8">Add a New Book to Catalog</h1>

    <form method="POST" th:action="@{/books/insert}" th:object="${book}" class="max-w-4xl">

        <div class="w-[500px] space-y-4 mb-8">
            <div class="grid grid-cols-2 gap-4 items-center">
                <label class="text-sm font-medium text-gray-700">Book Title:</label>
                <input type="text" th:field="*{title}" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-black focus:border-black sm:text-sm"/>
            </div>
            <div class="grid grid-cols-2 gap-4 items-center">
                <label class="text-sm font-medium text-gray-700">Price (RSD):</label>
                <input type="number" th:field="*{price}" min="0" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-black focus:border-black sm:text-sm"/>
            </div>
        </div>

        <div id="attributes-container" class="space-y-4 mb-6">
            <th:block th:each="entry : ${book.customAttributes}">
                <div th:replace="~{fragments/custom-attribute-row :: custom-attribute-row(key=${entry.key}, value=${entry.value})}"></div>
            </th:block>
        </div>

        <div class="w-[500px] flex justify-center mb-8">
            <button type="button"
                    hx-get="/books/custom-attribute-row"
                    hx-target="#attributes-container"
                    hx-swap="beforeend"
                    class="px-4 py-2 bg-gray-200 text-gray-800 text-xs font-bold uppercase tracking-widest rounded hover:bg-gray-300 transition-all active:scale-95">
                +
            </button>
        </div>

        <button type="submit"
                class="w-[500px] px-4 py-2 bg-black text-white text-xs font-bold uppercase tracking-widest rounded hover:bg-gray-800 transition-all active:scale-95">
            Save Book
        </button>
    </form>

    <div class="mt-8">
        <a th:href="@{/books}" class="text-sm text-gray-500 hover:text-black underline transition-colors">Back to Catalog</a>
    </div>
</main>

</body>
</html>
