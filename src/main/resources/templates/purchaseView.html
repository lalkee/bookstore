<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bookstore Catalog</title>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>

<h1>Bookstore Catalog</h1>

<div th:each="b : ${books}">
    <h3>
        <a th:href="@{/books/{id}(id=${b.id})}" th:text="${b.title}">Book Title</a>
    </h3>
    <form method="POST" th:action="@{/cart/add}">
        <input type="hidden" name="id" th:value="${b.id}">
        <button type="submit">Add to cart</button>
    </form>
    <hr>
</div>

</body>
</html>
