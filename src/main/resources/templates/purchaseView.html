<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: main(~{:: main})}">
<head>
    <title>Bookstore Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
</head>
<body class="bg-white text-gray-900">
<div th:replace="~{fragments/header :: header}"></div>

<main class="max-w-7xl mx-auto px-4 py-12">
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-12 gap-y-16">

        <div th:each="b : ${books}" class="relative group flex flex-col">

            <div class="aspect-[2/3] flex items-center justify-center bg-gray-100 rounded-md mb-4 group-hover:bg-gray-200 transition-colors">
                <svg class="w-12 h-12 text-gray-300 group-hover:text-gray-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
            </div>

            <h3 class="font-bold text-base leading-tight mb-3">
                <a th:href="@{/books/{id}(id=${b.id})}"
                   th:text="${b.title}"
                   class="after:absolute after:inset-0 hover:text-gray-600 transition-colors">
                    Book Title
                </a>
            </h3>

            <div class="flex items-center justify-between gap-4 mt-auto">
                <span class="text-lg font-medium tracking-tight" th:text="|${b.price} RSD|">
                    0.00 RSD
                </span>
                <div class="relative z-20">
                    <input type="hidden" name="id" th:value="${b.id}">
                    <button hx-post="/cart/add"
                            hx-target="#cart-count"
                            hx-include="closest div"
                            hx-swap="innerHTML"
                            class="px-4 py-2 bg-black text-white text-xs font-bold uppercase tracking-widest rounded hover:bg-gray-800 transition-all active:scale-95">
                        Add to cart
                    </button>
                </div>
            </div>

        </div>

    </div>
</main>
</body>
</html>
