<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900">

<div th:replace="~{fragments :: header}"></div>

<main class="max-w-7xl mx-auto px-4 py-12">

    <h1 class="text-3xl font-bold mb-8">All Customer Orders</h1>

    <div th:if="${orders.isEmpty()}" class="text-center text-gray-500 py-12">
        <p>There are no orders in the system yet.</p>
    </div>

    <div th:if="${!orders.isEmpty()}" class="space-y-8">
        <div th:each="order : ${orders}" class="border border-gray-200
   rounded-lg p-6">
            <div class="flex justify-between items-start mb-4 pb-4 border-b
   border-gray-100">
                <div>
                    <h2 class="text-xl font-semibold">Order #<span
                            th:text="${order.id}"></span></h2>
                    <p class="text-sm text-gray-600">Placed on: <span
                            th:text="${#temporals.format(order.timestamp, 'dd MMM yyyy,HH:mm')}"></span></p>
                    <p class="text-sm text-gray-600">Shipping to: <span
                            th:text="${order.address}"></span></p>
                </div>
                <div class="text-right">
                    <p class="text-lg font-bold" th:text="'$' +
   ${#numbers.formatDecimal(order.totalPrice, 1, 2)}"></p>
                    <span class="px-2 py-1 text-xs font-semibold
   rounded-full"
                          th:text="${order.status}"
                          th:classappend="${order.status.name() == 'PENDING'
   ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'}">
                           Status
                       </span>
                </div>
            </div>

            <div class="space-y-4">
                <div th:each="item : ${order.items}" class="grid grid-cols-6
   gap-4 items-center">
                    <div class="col-span-3">
                        <p class="font-medium" th:text="${item.title}"></p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-600">Qty: <span
                                th:text="${item.quantity}"></span></p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-600 text-right"
                           th:text="'$' + ${#numbers.formatDecimal(item.price, 1, 2)} + ' each'"></p>
                    </div>
                    <div>
                        <p class="font-semibold text-right" th:text="'$' +
   ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
