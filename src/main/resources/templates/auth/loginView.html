<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: main(~{:: main}, 'Login')}">
<head>
    <title>Bookstore Login</title>
</head>
<body class="bg-neutral text-on-neutral">

<main th:fragment="main" class="max-w-md mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold mb-8 text-center">Login</h1>

    <div th:if="${param.verified}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4">
        <strong class="font-bold">Success!</strong>
        <span class="block sm:inline">Account verified. You can now login.</span>
    </div>

    <div th:if="${param.error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
        <strong class="font-bold">Login Failed!</strong>
        <span class="block sm:inline">
            Invalid email, password, or account not yet verified.
        </span>
    </div>

    <form method="POST" th:action="@{/login}" class="space-y-6" hx-boost="false">
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700">Email Address</label>
            <input type="text" name="username" id="username" required
                   class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:ring-primary-hover focus:border-primary-hover sm:text-sm" />
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" name="password" id="password" required
                   class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:ring-primary-hover focus:border-primary-hover sm:text-sm" />
        </div>
        <div>
            <button type="submit" class="w-full py-2 px-4 rounded-md text-sm font-medium text-on-primary bg-primary hover:bg-primary-hover transition-colors">
                Login
            </button>
        </div>
    </form>

    <p class="mt-8 text-center text-sm text-gray-600">
        New here? <a th:href="@{/register}" class="font-medium text-primary hover:text-primary-hover">Register</a>
    </p>
</main>
</body>
</html>
