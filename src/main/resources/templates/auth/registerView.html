<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: main(~{:: main}, 'Register')}">
<body>

<main th:fragment="main" class="max-w-md mx-auto px-4 py-12" id="register-container">
    <h1 class="text-3xl font-bold mb-8 text-center">Create an Account</h1>

    <form hx-post="/register"
          hx-target="#register-container"
          hx-swap="outerHTML"
          th:object="${user}"
          class="space-y-5">

        <div th:if="${#fields.hasGlobalErrors()}" class="p-3 bg-red-100 border border-red-400 rounded">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" class="text-red-700 text-sm"></p>
        </div>

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
            <input type="email" th:field="*{email}" id="email" required
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-primary-hover focus:border-primary-hover sm:text-sm"/>
            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-600 text-xs mt-1 italic"></p>
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" th:field="*{password}" id="password" required
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-primary-hover focus:border-primary-hover sm:text-sm"/>
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-600 text-xs mt-1 italic"></p>
        </div>

        <div>
            <label for="matchingPassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
            <input type="password" th:field="*{matchingPassword}" id="matchingPassword" required
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-primary-hover focus:border-primary-hover sm:text-sm"/>
            <p th:if="${#fields.hasErrors('matchingPassword')}" th:errors="*{matchingPassword}" class="text-red-600 text-xs mt-1 italic"></p>
        </div>

        <div class="pt-2">
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-on-primary bg-primary hover:bg-primary-hover transition-colors">
                Register
            </button>
        </div>
    </form>

    <p class="mt-8 text-center text-sm text-gray-600">
        Already have an account?
        <a th:href="@{/login}" class="font-medium text-primary hover:text-primary-hover">Login here</a>
    </p>
</main>

</body>
</html>
