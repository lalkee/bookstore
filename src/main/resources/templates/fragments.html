<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<div th:fragment="header" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <header class="w-full bg-gray-50 text-gray-900 border-b border-gray-100">
        <nav class="max-w-7xl mx-auto flex items-stretch justify-between h-16 px-4">
            <div class="flex items-stretch gap-2">
                <a th:href="@{/books}"
                   class="flex items-center px-4 hover:bg-gray-200 transition-colors font-medium text-sm uppercase tracking-wide">
                    Home
                </a>
                <a th:href="@{/books/insert}"
                   sec:authorize="hasRole('ADMIN')"
                   class="flex items-center px-4 hover:bg-gray-200 transition-colors font-medium text-sm uppercase tracking-wide">
                    Add Book
                </a>
            </div>

            <div class="flex items-stretch gap-0">
                <a th:href="@{/cart}"
                   class="flex items-center px-6 hover:bg-gray-200 transition-colors font-bold text-sm uppercase tracking-widest border-l border-gray-100">
                    Cart (<span th:text="${cart.items.size()}" class="ml-1">0</span>)
                </a>

                <div sec:authorize="!isAuthenticated()" class="flex items-stretch">
                    <a th:href="@{/login}"
                       class="flex items-center px-4 hover:bg-gray-200 transition-colors text-sm font-medium">
                        Login
                    </a>
                </div>

                <div sec:authorize="isAuthenticated()" class="flex items-stretch">

                    <form th:action="@{/logout}" method="post" class="flex items-stretch">
                        <button type="submit"
                                class="flex items-center px-4 hover:bg-gray-200 transition-colors text-sm font-medium">
                            Logout
                        </button>
                    </form>
                </div>
            </div>
        </nav>
    </header>
</div>

</body>
</html>
