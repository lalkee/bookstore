<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${selectedBook.title}">Book Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900">
<div th:replace="~{fragments :: header}"></div>

<main class="max-w-7xl mx-auto px-4 py-12">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-start">

        <div class="aspect-[2/3] flex items-center justify-center bg-gray-100 rounded-md w-full max-w-md mx-auto">
            <svg class="w-24 h-24 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
        </div>

        <div class="flex flex-col h-full">
            <h1 class="text-4xl font-bold tracking-tight mb-4" th:text="${selectedBook.title}">Title</h1>

            <div class="text-2xl font-medium mb-8">
                <span th:text="${selectedBook.price}">0.00</span> <span class="text-lg">RSD</span>
            </div>

            <div class="space-y-3 mb-8 border-t border-gray-100 pt-6">
                <div th:each="entry : ${selectedBook.customAttributes}" class="text-sm">
                    <span class="font-bold uppercase tracking-wider text-gray-500 mr-2" th:text="|${entry.key}:|">Key:</span>
                    <span class="text-gray-900" th:text="${entry.value}">Value</span>
                </div>
            </div>

            <div class="mt-auto pt-6">
                <form method="POST" th:action="@{/cart/add}">
                    <input type="hidden" name="id" th:value="${selectedBook.id}">
                    <button type="submit"
                            class="w-full md:w-auto px-12 py-4 bg-black text-white text-sm font-bold uppercase tracking-widest rounded hover:bg-gray-800 transition-all active:scale-95">
                        Add to cart
                    </button>
                </form>

                <div class="mt-8">
                    <a th:href="@{/books}" class="text-sm font-medium text-gray-500 hover:text-black transition-colors flex items-center gap-2">
                        ← Back to Catalog
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
