<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: main(~{:: main}, 'Register')}">
<head>
    <title>Bookstore - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900">

<main class="max-w-md mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold mb-8 text-center">Register</h1>

    <form method="POST" th:action="@{/register}" id="showRegisterForm" class="space-y-6">
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700">Username:</label>
            <input type="text" name="username" id="username" required class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"/><br/>
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Password:</label>
            <input type="password" name="password" id="password" required class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"/><br/>
        </div>
        <div>
            <input type="submit" value="Register" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"/>
        </div>
    </form>

    <p class="mt-8 text-center text-sm text-gray-600">
        Already have an account?
        <a th:href="@{/login}" class="font-medium text-indigo-600 hover:text-indigo-500">Login here</a>
    </p>
</main>
</body>
</html>
